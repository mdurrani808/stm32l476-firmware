name: Continuous integration pipeline
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: STM32CubeIDE build
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4.2.2

      - name: Determine short GIT hash
        id: short-sha
        run: |
          echo "sha=$(echo ${{ github.sha }} | sed 's/^\(.\{10\}\).*$/\1/')" >> $GITHUB_OUTPUT

      - name: Build the firmware binary
        uses: xanderhendriks/action-build-stm32cubeide@v17.0
        with:
          project-path: '.'
          project-target: 'stm32l476-firmware'
          stm32cubeide-version: '2.1.1'

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4.6.1
        with:
          name: stm32l476-firmware-${{ steps.short-sha.outputs.sha }}
          path: |
            Debug/stm32l476-firmware.elf
            Debug/stm32l476-firmware.bin
            Debug/stm32l476-firmware.map
            Debug/stm32l476-firmware.list
